# =============================================================================
# Vault Deploy Pipeline
# Triggers: push to main, manual dispatch
# Flow: Terraform → Ansible → Vault scripts → Validate
# =============================================================================

name: Deploy Vault

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      skip_terraform:
        description: "Skip Terraform (EC2 already exists)"
        required: false
        default: false
        type: boolean
      skip_ansible:
        description: "Skip Ansible (Vault already installed)"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.10.0"
  PYTHON_VERSION: "3.11"
  VAULT_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Terraform — provision EC2
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    defaults:
      run:
        working-directory: terraform-template/environments/dev

    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4

      - name: Checkout terraform repo
        uses: actions/checkout@v4
        with:
          repository: Santiago1010/terraform-template
          token: ${{ secrets.GH_PAT }}
          path: terraform-template

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -target=module.vault -out=vault.tfplan
        env:
          TF_VAR_project: ${{ vars.TF_PROJECT }}
          TF_VAR_environment: ${{ env.VAULT_ENV }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_aws_profile: default
          TF_VAR_vault_db_password: ${{ secrets.VAULT_DB_PASSWORD }}

      - name: Terraform apply
        run: terraform apply vault.tfplan

      - name: Get Vault private IP
        id: vault_ip
        run: |
          IP=$(terraform output -raw vault_private_ip 2>/dev/null || echo "")
          echo "vault_ip=${IP}" >> $GITHUB_OUTPUT

    outputs:
      vault_ip: ${{ steps.vault_ip.outputs.vault_ip }}

  # ---------------------------------------------------------------------------
  # 2. Ansible — install and configure Vault
  # ---------------------------------------------------------------------------
  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform
    if: |
      always() &&
      github.event.inputs.skip_ansible != 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4

      - name: Checkout ansible repo
        uses: actions/checkout@v4
        with:
          repository: Santiago1010/ansible-template
          token: ${{ secrets.GH_PAT }}
          path: ansible-template

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible + AWS dependencies
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws community.docker

      - name: Run Ansible playbook
        working-directory: ansible-template
        run: |
          ansible-playbook site.yml \
            --limit vault \
            --tags vault \
            -e "environment=${{ env.VAULT_ENV }}" \
            -e "project=${{ vars.TF_PROJECT }}" \
            -e "aws_region=${{ env.AWS_REGION }}" \
            -e "aws_profile=default"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # 3. Vault scripts — engines, auth, secrets, pki, database
  # ---------------------------------------------------------------------------
  vault_setup:
    name: Vault Setup
    runs-on: ubuntu-latest
    needs: ansible
    if: |
      always() &&
      (needs.ansible.result == 'success' || needs.ansible.result == 'skipped')

    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Vault IP from SSM
        id: vault_ip
        run: |
          IP=$(aws ssm get-parameter \
            --name "/${{ vars.TF_PROJECT }}/${{ env.VAULT_ENV }}/vault-private-ip" \
            --query Parameter.Value \
            --output text)
          echo "vault_ip=${IP}" >> $GITHUB_OUTPUT

      - name: Setup Vault via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=${{ vars.TF_PROJECT }}" \
              "Name=tag:Service,Values=vault" \
              "Name=tag:Environment,Values=${{ env.VAULT_ENV }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          SETUP_CMD=$(cat << 'SSMEOF'
          export VAULT_PROJECT=${{ vars.TF_PROJECT }}
          export VAULT_ENV=${{ env.VAULT_ENV }}
          export VAULT_CONTAINER=vault
          export VAULT_ADDR=https://127.0.0.1:8200
          export VAULT_CACERT=/etc/vault/tls/vault.crt
          export VAULT_DOMAIN=${{ vars.TF_PROJECT }}.internal
          export AWS_REGION=${{ env.AWS_REGION }}
          export VAULT_DB_ENGINE=postgresql
          export VAULT_DB_HOST=${{ vars.POSTGRESQL_PRIVATE_IP }}
          export VAULT_DB_PORT=5432
          export VAULT_DB_ROOT_USER=postgres
          cd /opt/vault
          ENV=${{ env.VAULT_ENV }} ./scripts/setup-engines.sh
          ENV=${{ env.VAULT_ENV }} ./scripts/setup-auth.sh
          ENV=${{ env.VAULT_ENV }} ./scripts/setup-secrets.sh
          ENV=${{ env.VAULT_ENV }} ./scripts/setup-pki.sh
          ENV=${{ env.VAULT_ENV }} ./scripts/setup-database.sh
          SSMEOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"${SETUP_CMD}\"]" \
            --query Command.CommandId \
            --output text)

          aws ssm wait command-executed \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}"

          RESULT=$(aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query StatusDetails --output text)
          echo "Setup result: ${RESULT}"
          [ "${RESULT}" = "Success" ] || exit 1

  # ---------------------------------------------------------------------------
  # 4. Validate
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: vault_setup

    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Vault IP from SSM
        id: vault_ip
        run: |
          IP=$(aws ssm get-parameter \
            --name "/${{ vars.TF_PROJECT }}/${{ env.VAULT_ENV }}/vault-private-ip" \
            --query Parameter.Value \
            --output text)
          echo "vault_ip=${IP}" >> $GITHUB_OUTPUT

      - name: Run validation via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=${{ vars.TF_PROJECT }}" \
              "Name=tag:Service,Values=vault" \
              "Name=tag:Environment,Values=${{ env.VAULT_ENV }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"cd /opt/vault && ENV=${{ env.VAULT_ENV }} ./scripts/validate.sh && ENV=${{ env.VAULT_ENV }} ./scripts/validate-approles.sh\"]" \
            --query Command.CommandId \
            --output text)

          aws ssm wait command-executed \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}"

          RESULT=$(aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query StatusDetails --output text)
          echo "Validate result: ${RESULT}"
          [ "${RESULT}" = "Success" ] || exit 1

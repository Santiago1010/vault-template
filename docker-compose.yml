# =============================================================================
# Vault — Production-grade local setup
# Network: kafka-network (external, already exists)
# =============================================================================

services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vault-template
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://127.0.0.1:8200"
      VAULT_CLUSTER_ADDR: "http://127.0.0.1:8201"
    volumes:
      - ./config/${VAULT_CONFIG}:/vault/config/vault.hcl:ro
      - ./data:/vault/data
      - ./logs:/vault/logs
    command: vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8200/v1/sys/health?sealedcode=200 | grep -q initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - kafka-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  vault-unseal:
    image: python:3.11-alpine
    container_name: vault-unseal
    restart: "no"
    profiles:
      - local
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./scripts/entrypoint-unseal.sh:/entrypoint-unseal.sh:ro
      - ./secrets:/secrets:ro
    command: sh /entrypoint-unseal.sh
    networks:
      - kafka-network

networks:
  kafka-network:
    external: true

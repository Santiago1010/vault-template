# =============================================================================
# Vault — Production-grade local setup
# =============================================================================

services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vault-template
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://127.0.0.1:8200"
      VAULT_CLUSTER_ADDR: "http://127.0.0.1:8201"
    volumes:
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - ./data:/vault/data
      - ./logs:/vault/logs
    command: vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kafka-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

networks:
  kafka-network:
    external: true